<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard EVO · Equinoxes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=Roboto+Condensed:wght@300;400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bleu:#222339;--bleu2:#2a2b47;--bleu3:#32345a;--bleu4:#1c1d33;--green:#3CE65F;--sub:rgba(255,255,255,0.68);--muted:rgba(255,255,255,0.38);--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.15);--assist:#60a5fa;--warn:#f59e0b;--crit:#ef4444}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;font-weight:300;background:var(--bleu);color:#fff;line-height:1.6;overflow-x:hidden;min-height:100vh}
h1,h2,h3,h4{font-family:'Raleway',sans-serif;font-weight:700;line-height:1.15}
nav{position:sticky;top:0;z-index:200;background:rgba(28,29,51,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 1.75rem}
.nav-logo{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.2rem;display:flex;align-items:center;gap:.5rem}
.nav-logo em{font-style:normal;color:var(--green)}
.nav-tag{font-family:'Roboto Condensed',sans-serif;font-size:.7rem;font-weight:400;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-left:.25rem}
.nav-right{display:flex;align-items:center;gap:.85rem}
#apiKeyBadge{font-family:'Roboto Condensed',sans-serif;font-size:.75rem;color:var(--muted);letter-spacing:.04em;background:var(--bleu3);padding:.25rem .7rem;border-radius:3px;border:1px solid var(--border);display:none}
.btn-nav{background:transparent;border:1px solid var(--border);color:var(--sub);font-family:'Raleway',sans-serif;font-weight:600;font-size:.75rem;padding:.3rem .85rem;border-radius:4px;cursor:pointer;transition:all .2s;display:none}
.btn-nav:hover{border-color:var(--border2);color:#fff}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:2rem}
.login-card{background:var(--bleu2);border:1px solid var(--border);border-radius:18px;padding:3rem 2.5rem;width:100%;max-width:420px;text-align:center}
.login-badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(60,230,95,.1);border:1px solid rgba(60,230,95,.22);color:var(--green);font-family:'Roboto Condensed',sans-serif;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;padding:.28rem .85rem;border-radius:2px;margin-bottom:1.8rem}
.login-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}
.login-card h1{font-size:1.85rem;margin-bottom:.5rem;letter-spacing:-.02em}
.login-card h1 em{font-style:normal;color:var(--green)}
.login-card p{font-family:'Roboto Condensed',sans-serif;font-weight:300;color:var(--sub);font-size:.9rem;margin-bottom:2rem;line-height:1.6}
.field{display:flex;flex-direction:column;gap:.4rem;text-align:left;margin-bottom:1.1rem}
.field label{font-family:'Roboto Condensed',sans-serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.field input{background:var(--bleu3);border:1px solid var(--border);border-radius:7px;padding:.75rem 1rem;color:#fff;font-family:'Roboto Condensed',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;width:100%}
.field input:focus{border-color:rgba(60,230,95,.45)}
.field input::placeholder{color:var(--muted)}
.btn-primary{background:var(--green);color:#000;font-family:'Raleway',sans-serif;font-weight:800;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;padding:.85rem 1.8rem;border-radius:5px;border:none;cursor:pointer;width:100%;transition:all .22s;margin-top:.35rem}
.btn-primary:hover:not(:disabled){opacity:.88;transform:translateY(-1px);box-shadow:0 8px 22px rgba(60,230,95,.22)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.login-hint{font-family:'Roboto Condensed',sans-serif;font-size:.75rem;color:var(--muted);margin-top:1.2rem;line-height:1.5}
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.28);color:#fca5a5;font-family:'Roboto Condensed',sans-serif;font-size:.85rem;padding:.65rem 1rem;border-radius:6px;margin-top:.75rem;text-align:left}
#appScreen{display:none;padding:1.75rem}
.app-wrap{max-width:1320px;margin:0 auto}
#loadingBar{position:fixed;top:60px;left:0;right:0;height:2px;background:var(--green);transform-origin:left;z-index:300;display:none;animation:loadbar 1.6s ease-in-out infinite}
@keyframes loadbar{0%{transform:scaleX(0)}50%{transform:scaleX(.6) translateX(50%)}100%{transform:scaleX(0) translateX(300%)}}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}

.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;gap:1rem;grid-column:1/-1}
.loading-label{font-family:'Roboto Condensed',sans-serif;font-size:.88rem;color:var(--sub)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.75rem}
.stat{background:var(--bleu2);border:1px solid var(--border);border-radius:11px;padding:1.2rem 1.4rem}
.stat-lbl{font-family:'Roboto Condensed',sans-serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.stat-val{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.9rem;line-height:1;color:#fff}
.stat-val sup{font-size:.9rem;font-weight:400;color:var(--sub);vertical-align:super}
.stat-sub{font-family:'Roboto Condensed',sans-serif;font-size:.75rem;color:var(--muted);margin-top:.3rem}
.sh{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.1rem}
.sh-left .lbl{font-family:'Roboto Condensed',sans-serif;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--green);margin-bottom:.2rem}
.sh-left .ttl{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.25rem}
.search{background:var(--bleu2);border:1px solid var(--border);border-radius:6px;padding:.4rem .9rem;color:#fff;font-family:'Roboto Condensed',sans-serif;font-size:.85rem;outline:none;width:200px;transition:border-color .2s}
.search:focus{border-color:rgba(60,230,95,.35)}
.search::placeholder{color:var(--muted)}
#clientsGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1.1rem;margin-bottom:2.5rem}
.cc{background:var(--bleu2);border:1px solid var(--border);border-radius:12px;padding:1.4rem;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.cc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),#00c9ff);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.cc:hover{border-color:rgba(60,230,95,.25);transform:translateY(-2px);box-shadow:0 10px 36px rgba(0,0,0,.32)}
.cc:hover::after{transform:scaleX(1)}
.cc-name{font-family:'Raleway',sans-serif;font-weight:700;font-size:1rem;margin-bottom:.15rem}
.cc-meta{font-family:'Roboto Condensed',sans-serif;font-size:.76rem;color:var(--muted);margin-bottom:.9rem}
.cc-projects{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:.85rem}
.proj-badge{font-family:'Roboto Condensed',sans-serif;font-size:.7rem;padding:.2rem .55rem;border-radius:3px;letter-spacing:.04em}
.proj-evo{background:rgba(60,230,95,.12);color:var(--green);border:1px solid rgba(60,230,95,.2)}
.proj-assist{background:rgba(96,165,250,.12);color:var(--assist);border:1px solid rgba(96,165,250,.2)}
.cc-evo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem}
.cc-evo-label{font-family:'Roboto Condensed',sans-serif;font-size:.76rem;color:var(--sub)}
.cc-pct{font-family:'Raleway',sans-serif;font-weight:800;font-size:.88rem}
.mini-bar{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:.8rem}
.mini-fill{height:100%;border-radius:3px;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.cc-bottom{display:flex;justify-content:space-between;font-family:'Roboto Condensed',sans-serif;font-size:.76rem;color:var(--muted)}
.cc-bottom strong{font-weight:400}
#detailPanel{display:none;margin-bottom:2rem}
.back-btn{display:inline-flex;align-items:center;gap:.45rem;font-family:'Roboto Condensed',sans-serif;font-size:.8rem;color:var(--sub);cursor:pointer;background:none;border:none;padding:0;margin-bottom:1.4rem;transition:color .2s;letter-spacing:.04em}
.back-btn:hover{color:var(--green)}
.back-btn:hover svg{transform:translateX(-3px)}
.back-btn svg{transition:transform .2s}
.detail-hero{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.75rem}
.detail-name{font-family:'Raleway',sans-serif;font-weight:800;font-size:2rem;letter-spacing:-.02em}
.detail-sub{font-family:'Roboto Condensed',sans-serif;font-weight:300;color:var(--sub);font-size:.88rem;margin-top:.25rem}
.detail-top{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.5rem}
@media(max-width:820px){.detail-top{grid-template-columns:1fr}}
.panel{background:var(--bleu2);border:1px solid var(--border);border-radius:12px;padding:1.5rem}
.panel-title{font-family:'Raleway',sans-serif;font-weight:700;font-size:.95rem;color:#fff;margin-bottom:1.1rem;display:flex;align-items:center;gap:.5rem}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0}
.dot.blue{background:var(--assist)}
.evo-meter{margin-bottom:1rem}
.evo-meter-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.6rem}
.evo-big{font-family:'Raleway',sans-serif;font-weight:800;font-size:2.4rem;line-height:1}
.evo-big sub{font-size:1rem;font-weight:400;color:var(--sub);margin-left:.2rem}
.evo-remain{font-family:'Roboto Condensed',sans-serif;font-size:.82rem;text-align:right;color:var(--muted)}
.evo-remain .val{font-family:'Raleway',sans-serif;font-weight:700;font-size:1.1rem;display:block}
.prog-bar{height:10px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden;margin-bottom:.75rem}
.prog-fill{height:100%;border-radius:5px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.fill-ok{background:linear-gradient(90deg,#2dd55b,var(--green))}
.fill-warn{background:linear-gradient(90deg,#e08008,var(--warn))}
.fill-crit{background:linear-gradient(90deg,#d42020,var(--crit))}
.evo-stats{display:flex;gap:1.5rem;font-family:'Roboto Condensed',sans-serif;font-size:.78rem;color:var(--sub)}
.evo-stats strong{color:#fff;font-weight:400;font-size:.88rem}
.contracts-list{display:flex;flex-direction:column;gap:.7rem}
.ctr-item{background:var(--bleu3);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem}
.ctr-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;margin-bottom:.3rem}
.ctr-name{font-family:'Raleway',sans-serif;font-weight:700;font-size:.9rem}
.ctr-hrs{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.2rem;color:var(--green)}
.ctr-hrs small{font-size:.75rem;font-weight:300;color:var(--sub);margin-left:.2rem}
.ctr-meta{font-family:'Roboto Condensed',sans-serif;font-size:.73rem;color:var(--muted)}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.5rem}
@media(max-width:700px){.charts-row{grid-template-columns:1fr}}
.chart-wrap{position:relative;height:185px}
.tickets-panel{background:var(--bleu2);border:1px solid var(--border);border-radius:12px;padding:1.5rem}
.filter-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.fbtn{background:var(--bleu3);border:1px solid var(--border);color:var(--sub);font-family:'Roboto Condensed',sans-serif;font-size:.75rem;padding:.28rem .7rem;border-radius:3px;cursor:pointer;transition:all .2s;letter-spacing:.03em}
.fbtn:hover,.fbtn.active{border-color:rgba(60,230,95,.35);color:var(--green);background:rgba(60,230,95,.06)}
.fbtn.blue.active{border-color:rgba(96,165,250,.35);color:var(--assist);background:rgba(96,165,250,.06);border-color:rgba(96,165,250,.35)}
.tbl-wrap{overflow-x:auto}
table.tix{width:100%;border-collapse:collapse}
table.tix th{font-family:'Roboto Condensed',sans-serif;font-size:.68rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);padding:.55rem 1rem;text-align:left;border-bottom:1px solid var(--border)}
table.tix td{padding:.7rem 1rem;border-bottom:1px solid rgba(255,255,255,.04);font-family:'Roboto Condensed',sans-serif;font-size:.83rem;color:var(--sub);vertical-align:middle}
table.tix tr:last-child td{border-bottom:none}
table.tix tr:hover td{background:rgba(255,255,255,.025);color:#fff}
.td-title{color:#fff;font-weight:400;max-width:320px}
.td-time{font-family:'Raleway',sans-serif;font-weight:700;color:var(--green);white-space:nowrap}
.td-time.zero{color:var(--muted);font-family:'Roboto Condensed',sans-serif;font-weight:300}
.proj-tag{display:inline-block;padding:.15rem .5rem;border-radius:2px;font-size:.7rem;letter-spacing:.04em}
.st-closed{background:rgba(60,230,95,.1);color:var(--green);border:1px solid rgba(60,230,95,.18)}
.st-open{background:rgba(96,165,250,.1);color:var(--assist);border:1px solid rgba(96,165,250,.18)}
.empty-row td{text-align:center;padding:2.5rem;color:var(--muted)}
.skel{background:linear-gradient(90deg,var(--bleu3) 25%,rgba(60,61,100,.5) 50%,var(--bleu3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.empty-state{text-align:center;padding:3rem 2rem;color:var(--muted);font-family:'Roboto Condensed',sans-serif;font-size:.88rem;grid-column:1/-1}
</style>
</head>
<body>

<div id="loadingBar"></div>

<nav>
  <div class="nav-logo">Equinox<em>es</em><span class="nav-tag">EVO Dashboard</span></div>
  <div class="nav-right">
    <span style="font-family:Roboto Condensed,sans-serif;font-size:.72rem;color:var(--muted);letter-spacing:.06em">Usage interne</span>
    <button class="btn-nav" style="display:block" onclick="loadAll()">↺ Actualiser</button>
  </div>
</nav>

<div id="appScreen" style="display:block">
  <div class="app-wrap">
    <div class="stats-row" id="statsRow">
      <div class="stat skel" style="height:82px"></div>
      <div class="stat skel" style="height:82px"></div>
      <div class="stat skel" style="height:82px"></div>
      <div class="stat skel" style="height:82px"></div>
    </div>
    <div id="detailPanel"></div>
    <div id="clientsSection">
      <div class="sh">
        <div class="sh-left"><div class="lbl">Clients actifs</div><div class="ttl">Contrats EVO</div></div>
        <input class="search" type="search" placeholder="Rechercher…" id="searchInput" oninput="filterClients()">
      </div>
      <div id="clientsGrid">
        <div class="cc skel" style="height:160px"></div>
        <div class="cc skel" style="height:160px"></div>
        <div class="cc skel" style="height:160px"></div>
        <div class="cc skel" style="height:160px"></div>
        <div class="cc skel" style="height:160px"></div>
        <div class="cc skel" style="height:160px"></div>
      </div>
    </div>
  </div>
</div>

<script>
const PROXY = '';
const EVO_IDS    = [2452592, 2452594, 2452595];
const EVO_HOURS  = {2452592:2, 2452594:4, 2452595:10};
const EVO_LABELS = {2452592:'EVO 2h', 2452594:'EVO 4h', 2452595:'EVO 10h'};

let API_KEY = '';
let G = {companies:[], invoices:[], projects:[], tickets:[], tts:{}};
let chartA = null, chartB = null;

// ── API ──
function axo(path) {
  return fetch(PROXY + path, {
    headers: {'userApiKey': API_KEY, 'Content-Type': 'application/json'}
  }).then(r => { if(!r.ok) throw new Error('HTTP '+r.status+' '+path); return r.json(); });
}

async function axoAll(path) {
  let page=1, all=[];
  while(true) {
    const sep = path.includes('?') ? '&' : '?';
    const data = await axo(path + sep + 'page=' + page);
    const items = Array.isArray(data) ? data : [];
    all = all.concat(items);
    if(items.length < 50) break;
    page++;
  }
  return all;
}

// ── HELPERS ──
function fmtH(h) {
  if(!h && h!==0) return '—';
  const hh = Math.floor(h), mm = Math.round((h-hh)*60);
  if(hh===0) return mm+'min';
  return mm>0 ? hh+'h'+String(mm).padStart(2,'0') : hh+'h';
}

function fmtDate(ts) {
  if(!ts) return '—';
  const d = isNaN(ts) ? new Date(ts) : new Date(Number(ts)*1000);
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
}

function barCls(pct) { return pct>=90?'fill-crit':pct>=70?'fill-warn':'fill-ok'; }
function isEvo(p) { return p && p.name && p.name.toLowerCase().includes('evo'); }
function isAssist(p) { return p && p.name && p.name.toLowerCase().includes('assistance'); }

function setLoading(on) {
  document.getElementById('loadingBar').style.display = on?'block':'none';
}

// ── LOGIN ──
async function connect() {
  const key = document.getElementById('apiInput').value.trim();
  if(!key) return;
  API_KEY = key;
  const btn = document.getElementById('btnConnect');
  btn.disabled=true; btn.textContent='Connexion…';
  document.getElementById('loginErr').innerHTML='';
  try {
    await axo('/api/v2/me');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').style.display='block';
    document.getElementById('apiKeyBadge').style.display='block';
    document.getElementById('apiKeyBadge').textContent=key.slice(0,5)+'•••••';
    document.getElementById('btnLogout').style.display='block';
    loadAll();
  } catch(e) {
    document.getElementById('loginErr').innerHTML=
      '<div class="error-box">⚠ Connexion impossible. Vérifiez que le proxy est lancé (<code>node proxy-axonaut.js</code>) et que la clé est correcte.<br><small>'+e.message+'</small></div>';
    btn.disabled=false; btn.textContent='Se connecter →'; API_KEY='';
  }
}
document.getElementById('apiInput').addEventListener('keydown',e=>{if(e.key==='Enter')connect();});

function logout() {
  API_KEY=''; G={companies:[],invoices:[],projects:[],tickets:[],tts:{}};
  if(chartA){chartA.destroy();chartA=null;} if(chartB){chartB.destroy();chartB=null;}
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('apiKeyBadge').style.display='none';
  document.getElementById('btnLogout').style.display='none';
  document.getElementById('detailPanel').style.display='none';
  document.getElementById('detailPanel').innerHTML='';
  document.getElementById('apiInput').value='';
}

// ── LOAD ──
async function loadAll() {
  API_KEY = "server"; // clé gérée côté serveur
  setLoading(true);
  setLoadMsg('Chargement des clients…');
  try {
    G.companies = await axoAll('/api/v2/companies');
    setLoadMsg('Chargement des factures…');
    G.invoices  = await axoAll('/api/v2/invoices');
    setLoadMsg('Chargement des projets…');
    G.projects  = await axoAll('/api/v2/projects');
    setLoadMsg('Chargement des tickets…');
    G.tickets   = await axoAll('/api/v2/tickets');
    setLoadMsg('Chargement des temps passés…');
    await loadTTs();
    setLoading(false);
    buildStats();
    buildGrid();
  } catch(e) {
    setLoading(false);
    document.getElementById('clientsGrid').innerHTML=
      '<div class="error-box" style="grid-column:1/-1">Erreur : '+e.message+'</div>';
  }
}

function setLoadMsg(msg) {
  document.getElementById('clientsGrid').innerHTML=
    '<div class="loading-state"><div class="spinner"></div><div class="loading-label">'+msg+'</div></div>';
}

async function loadTTs() {
  const evoProjIds = new Set(G.projects.filter(p=>isEvo(p)||isAssist(p)).map(p=>p.id));
  const rel = G.tickets.filter(t=>t.project_id && evoProjIds.has(t.project_id));
  for(let i=0;i<rel.length;i+=5) {
    const batch = rel.slice(i,i+5);
    await Promise.all(batch.map(async t=>{
      try { G.tts[t.id]=await axoAll('/api/v2/tickets/'+t.id+'/timetrackings'); }
      catch(e){ G.tts[t.id]=[]; }
    }));
  }
}

// ── CALCULS ──
function cdata(companyId) {
  const cid = String(companyId);
  const evoPrj    = G.projects.filter(p=>String(p.company_id)===cid && isEvo(p));
  const assistPrj = G.projects.filter(p=>String(p.company_id)===cid && isAssist(p));
  const allPrj    = [...evoPrj,...assistPrj];
  const prjIds    = new Set(allPrj.map(p=>p.id));

  const contracts = [];
  for(const inv of G.invoices) {
    const ic = inv.company ? String(inv.company.id) : '';
    if(ic!==cid) continue;
    for(const ln of (inv.invoice_lines||[])) {
      const pid=Number(ln.product_id);
      if(!EVO_IDS.includes(pid)) continue;
      contracts.push({label:EVO_LABELS[pid],hours:EVO_HOURS[pid]*(ln.quantity||1),
        qty:ln.quantity||1, invoiceNum:inv.number||inv.id, invoiceDate:inv.date, pid});
    }
  }

  const tickets = G.tickets
    .filter(t=>t.project_id && prjIds.has(t.project_id))
    .map(t=>{
      const hrs=(G.tts[t.id]||[]).reduce((s,tt)=>s+(tt.hours||0),0);
      const prj=allPrj.find(p=>p.id===t.project_id);
      return {...t, hours:hrs, projectName:prj?prj.name:''};
    });

  const soldH  = contracts.reduce((s,c)=>s+c.hours,0);
  const evoTix = tickets.filter(t=>isEvo({name:t.projectName}));
  const usedH  = evoTix.reduce((s,t)=>s+t.hours,0);
  const remH   = Math.max(0,soldH-usedH);
  const pct    = soldH>0 ? Math.min(100,Math.round((usedH/soldH)*100)) : 0;
  return {evoPrj,assistPrj,contracts,tickets,evoTix,soldH,usedH,remH,pct};
}

// ── STATS GLOBALES ──
function buildStats() {
  const clients = G.companies.filter(c=>cdata(c.id).contracts.length>0);
  let tS=0,tU=0,tT=0;
  for(const c of clients){const d=cdata(c.id);tS+=d.soldH;tU+=d.usedH;tT+=d.tickets.length;}
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-lbl">Clients EVO actifs</div><div class="stat-val">${clients.length}</div><div class="stat-sub">avec au moins un contrat</div></div>
    <div class="stat"><div class="stat-lbl">Heures vendues</div><div class="stat-val">${tS}<sup>h</sup></div><div class="stat-sub">total contrats EVO</div></div>
    <div class="stat"><div class="stat-lbl">Heures consommées</div><div class="stat-val">${fmtH(tU)}</div><div class="stat-sub">${Math.round(tS>0?(tU/tS)*100:0)}% du total</div></div>
    <div class="stat"><div class="stat-lbl">Interventions</div><div class="stat-val">${tT}</div><div class="stat-sub">tickets EVO + Assistance</div></div>`;
}

// ── GRID ──
function buildGrid() {
  const list = G.companies
    .map(c=>({c,d:cdata(c.id)}))
    .filter(({d})=>d.contracts.length>0)
    .sort((a,b)=>b.d.pct-a.d.pct);
  if(!list.length){document.getElementById('clientsGrid').innerHTML='<div class="empty-state">Aucun client avec contrat EVO trouvé.</div>';return;}
  document.getElementById('clientsGrid').innerHTML = list.map(({c,d})=>{
    const pc=d.pct>=90?'var(--crit)':d.pct>=70?'var(--warn)':'var(--green)';
    const rc=d.remH<1?'var(--crit)':d.remH<2?'var(--warn)':'var(--green)';
    const badges=[
      ...d.evoPrj.map(p=>'<span class="proj-badge proj-evo">'+p.name+'</span>'),
      ...d.assistPrj.map(p=>'<span class="proj-badge proj-assist">'+p.name+'</span>'),
    ].join('');
    return `<div class="cc" onclick="showDetail('${c.id}')" data-name="${(c.name||'').toLowerCase()}">
      <div class="cc-name">${c.name||'Client #'+c.id}</div>
      <div class="cc-meta">${c.address_city||''}</div>
      <div class="cc-projects">${badges||'<span style="font-size:.72rem;color:var(--muted)">Aucun projet lié</span>'}</div>
      <div class="cc-evo-row"><span class="cc-evo-label">Consommation EVO</span><span class="cc-pct" style="color:${pc}">${d.pct}%</span></div>
      <div class="mini-bar"><div class="mini-fill ${barCls(d.pct)}" style="width:${d.pct}%"></div></div>
      <div class="cc-bottom">
        <span>Utilisé : <strong style="color:#fff">${fmtH(d.usedH)}</strong> / ${d.soldH}h</span>
        <span>Reste <strong style="color:${rc}">${fmtH(d.remH)}</strong></span>
      </div>
    </div>`;
  }).join('');
}

function filterClients() {
  const q=document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.cc[data-name]').forEach(el=>{el.style.display=el.dataset.name.includes(q)?'':'none';});
}

// ── DETAIL ──
function showDetail(cid) {
  const client=G.companies.find(c=>String(c.id)===String(cid));
  if(!client) return;
  const d=cdata(cid);
  document.getElementById('clientsSection').style.display='none';
  const panel=document.getElementById('detailPanel');
  panel.style.display='block';

  const rc=d.remH<1?'var(--crit)':d.remH<2?'var(--warn)':'var(--green)';
  const contratsHTML=d.contracts.length===0
    ?'<div style="color:var(--muted);font-family:Roboto Condensed;font-size:.85rem">Aucun contrat EVO facturé</div>'
    :d.contracts.map(c=>`<div class="ctr-item"><div class="ctr-top"><span class="ctr-name">${c.label}</span><span class="ctr-hrs">${c.hours}h<small>achetées</small></span></div><div class="ctr-meta">Facture ${c.invoiceNum} · ${fmtDate(c.invoiceDate)} · qté ${c.qty}</div></div>`).join('');

  const badges=[
    ...d.evoPrj.map(p=>'<span class="proj-badge proj-evo">'+p.name+'</span>'),
    ...d.assistPrj.map(p=>'<span class="proj-badge proj-assist">'+p.name+'</span>'),
  ].join('');

  const tixSorted=d.tickets.sort((a,b)=>new Date(b.creation_date)-new Date(a.creation_date));
  const tixRows=!tixSorted.length
    ?'<tr class="empty-row"><td colspan="6">Aucun ticket trouvé</td></tr>'
    :tixSorted.map(t=>{
      const evo=isEvo({name:t.projectName});
      const stCls=t.is_closed?'st-closed':'st-open';
      const stLbl=t.is_closed?'Fermé':'Ouvert';
      const timeHtml=t.hours>0?'<span class="td-time">'+fmtH(t.hours)+'</span>':'<span class="td-time zero">—</span>';
      return `<tr data-proj="${evo?'evo':'assist'}">
        <td style="color:var(--muted)">${t.reference||'#'+t.id}</td>
        <td class="td-title">${t.title||'—'}</td>
        <td><span class="proj-tag ${evo?'proj-evo':'proj-assist'}">${t.projectName}</span></td>
        <td>${timeHtml}</td>
        <td><span class="proj-tag ${stCls}">${stLbl}</span></td>
        <td>${fmtDate(t.creation_date)}</td>
      </tr>`;
    }).join('');

  const assistTix=d.tickets.filter(t=>!isEvo({name:t.projectName}));
  const miniEvoList=d.evoTix.slice(0,5).map(t=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--border)">
      <span style="font-family:Roboto Condensed;font-size:.8rem;color:var(--sub);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title||'#'+t.id}</span>
      <span style="font-family:Raleway;font-weight:700;font-size:.82rem;color:var(--green);flex-shrink:0;margin-left:.5rem">${t.hours>0?fmtH(t.hours):'—'}</span>
    </div>`).join('');

  panel.innerHTML=`
    <button class="back-btn" onclick="closeDetail()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Retour aux clients
    </button>
    <div class="detail-hero">
      <div><div class="detail-name">${client.name}</div>
      <div class="detail-sub">${client.address_city||''} · ${d.contracts.length} contrat(s) · ${d.tickets.length} ticket(s)</div></div>
      <div style="display:flex;gap:.45rem;flex-wrap:wrap;align-items:center">${badges}</div>
    </div>
    <div class="charts-row">
      <div class="panel"><div class="panel-title"><span class="dot"></span>Répartition tickets</div><div class="chart-wrap"><canvas id="cDonut"></canvas></div></div>
      <div class="panel"><div class="panel-title"><span class="dot"></span>Temps par projet (h)</div><div class="chart-wrap"><canvas id="cBar"></canvas></div></div>
    </div>
    <div class="detail-top">
      <div class="panel">
        <div class="panel-title"><span class="dot"></span>Contrats EVO achetés</div>
        <div class="contracts-list">${contratsHTML}</div>
      </div>
      <div class="panel">
        <div class="panel-title"><span class="dot"></span>Solde EVO</div>
        <div class="evo-meter">
          <div class="evo-meter-top">
            <div class="evo-big">${fmtH(d.usedH)}<sub>utilisés</sub></div>
            <div class="evo-remain"><span class="val" style="color:${rc}">${fmtH(d.remH)}</span>restants</div>
          </div>
          <div class="prog-bar"><div class="prog-fill ${barCls(d.pct)}" style="width:${d.pct}%"></div></div>
          <div class="evo-stats">
            <span>Acheté : <strong>${d.soldH}h</strong></span>
            <span>Consommé : <strong>${fmtH(d.usedH)}</strong></span>
            <span>${d.pct}% utilisé</span>
          </div>
        </div>
        ${d.evoTix.length>0?`<div style="margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem">
          <div style="font-family:Roboto Condensed;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem">Dernières interventions EVO</div>
          ${miniEvoList}
          ${d.evoTix.length>5?'<div style="font-family:Roboto Condensed;font-size:.74rem;color:var(--muted);margin-top:.5rem">+'+( d.evoTix.length-5)+' autres dans le tableau ci-dessous</div>':''}
        </div>`:''}
      </div>
    </div>
    <div class="tickets-panel">
      <div class="panel-title" style="margin-bottom:.75rem"><span class="dot blue"></span>Tous les tickets</div>
      <div class="filter-row" id="filterRow">
        <button class="fbtn active" onclick="filterTix(null,this)">Tous (${tixSorted.length})</button>
        <button class="fbtn active" onclick="filterTix('evo',this)">EVO (${d.evoTix.length})</button>
        <button class="fbtn blue" onclick="filterTix('assist',this)">Assistance (${assistTix.length})</button>
      </div>
      <div class="tbl-wrap">
        <table class="tix" id="tixTable">
          <thead><tr><th>Réf.</th><th>Sujet</th><th>Projet</th><th>Temps</th><th>Statut</th><th>Date</th></tr></thead>
          <tbody>${tixRows}</tbody>
        </table>
      </div>
    </div>`;

  buildCharts(d);
  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

function closeDetail() {
  if(chartA){chartA.destroy();chartA=null;} if(chartB){chartB.destroy();chartB=null;}
  document.getElementById('detailPanel').style.display='none';
  document.getElementById('detailPanel').innerHTML='';
  document.getElementById('clientsSection').style.display='block';
}

// ── CHARTS ──
function buildCharts(d) {
  const evoC=d.evoTix.length, asC=d.tickets.length-evoC;
  const evoH=d.evoTix.reduce((s,t)=>s+t.hours,0);
  const asH=d.tickets.filter(t=>!isEvo({name:t.projectName})).reduce((s,t)=>s+t.hours,0);
  const base={responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'rgba(255,255,255,.6)',font:{family:'Roboto Condensed',size:11}}}}};
  chartA=new Chart(document.getElementById('cDonut'),{type:'doughnut',
    data:{labels:['EVO','Assistance'],datasets:[{data:[evoC,asC],
      backgroundColor:['rgba(60,230,95,.75)','rgba(96,165,250,.75)'],borderColor:'transparent',borderWidth:0,hoverOffset:6}]},
    options:{...base,cutout:'68%',plugins:{...base.plugins,tooltip:{callbacks:{label:ctx=>' '+ctx.label+' : '+ctx.parsed+' ticket(s)'}}}}});
  chartB=new Chart(document.getElementById('cBar'),{type:'bar',
    data:{labels:['EVO','Assistance'],datasets:[{label:'Heures',data:[Math.round(evoH*100)/100,Math.round(asH*100)/100],
      backgroundColor:['rgba(60,230,95,.7)','rgba(96,165,250,.7)'],borderRadius:5,borderSkipped:false}]},
    options:{...base,indexAxis:'y',
      scales:{x:{ticks:{color:'rgba(255,255,255,.4)',font:{family:'Roboto Condensed',size:10}},grid:{color:'rgba(255,255,255,.05)'},border:{display:false}},
        y:{ticks:{color:'rgba(255,255,255,.65)',font:{family:'Roboto Condensed',size:11}},grid:{display:false},border:{display:false}}},
      plugins:{...base.plugins,legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmtH(ctx.parsed.x)}}}}});
}

window.addEventListener("DOMContentLoaded", loadAll);

function filterTix(type,btn) {
  document.querySelectorAll('#filterRow .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#tixTable tbody tr[data-proj]').forEach(r=>{r.style.display=(!type||r.dataset.proj===type)?'':'none';});
}
</script>
