<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVO Dashboard · Equinoxes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=Roboto+Condensed:wght@300;400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bleu:#222339;--bleu2:#2a2b47;--bleu3:#32345a;--bleu4:#1c1d33;
  --green:#3CE65F;--assist:#60a5fa;--warn:#f59e0b;--crit:#ef4444;
  --sub:rgba(255,255,255,0.68);--muted:rgba(255,255,255,0.38);
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;font-weight:300;background:var(--bleu);color:#fff;min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Raleway',sans-serif;font-weight:700}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:rgba(28,29,51,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem}
.nav-logo{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.2rem;display:flex;align-items:center;gap:.4rem;cursor:pointer}
.nav-logo em{font-style:normal;color:var(--green)}
.nav-tag{font-family:'Roboto Condensed',sans-serif;font-size:.68rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-left:.3rem}
.btn-nav{background:transparent;border:1px solid var(--border);color:var(--sub);font-family:'Raleway',sans-serif;font-weight:600;font-size:.75rem;padding:.3rem .85rem;border-radius:4px;cursor:pointer;transition:all .2s}
.btn-nav:hover{border-color:var(--border2);color:#fff}

/* SEARCH PAGE */
#searchPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:2rem;gap:2.5rem}
.search-hero{text-align:center}
.search-eyebrow{display:inline-flex;align-items:center;gap:.5rem;background:rgba(60,230,95,.1);border:1px solid rgba(60,230,95,.22);color:var(--green);font-family:'Roboto Condensed',sans-serif;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;padding:.28rem .85rem;border-radius:2px;margin-bottom:1.5rem}
.search-eyebrow::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}
.search-hero h1{font-size:clamp(2rem,4vw,3rem);letter-spacing:-.02em;margin-bottom:.6rem}
.search-hero h1 em{font-style:normal;color:var(--green)}
.search-hero p{font-family:'Roboto Condensed',sans-serif;color:var(--sub);font-size:.95rem}
.search-box{position:relative;width:100%;max-width:520px}
.search-box input{width:100%;background:var(--bleu2);border:1px solid var(--border2);border-radius:12px;padding:1rem 1.25rem 1rem 3.2rem;color:#fff;font-family:'Raleway',sans-serif;font-size:1.05rem;font-weight:600;outline:none;transition:all .25s}
.search-box input:focus{border-color:rgba(60,230,95,.5);box-shadow:0 0 0 3px rgba(60,230,95,.08)}
.search-box input::placeholder{color:var(--muted);font-weight:300}
.search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-spinner{position:absolute;right:1rem;top:50%;transform:translateY(-50%);display:none}
.spinner-sm{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULTS DROPDOWN */
#searchResults{width:100%;max-width:520px;background:var(--bleu2);border:1px solid var(--border2);border-radius:12px;overflow:hidden;display:none;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.result-item{padding:1rem 1.25rem;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.result-item:last-child{border-bottom:none}
.result-item:hover{background:var(--bleu3)}
.result-name{font-family:'Raleway',sans-serif;font-weight:700;font-size:.95rem}
.result-meta{font-family:'Roboto Condensed',sans-serif;font-size:.75rem;color:var(--muted);margin-top:.15rem}
.result-arrow{color:var(--muted);transition:all .15s}
.result-item:hover .result-arrow{color:var(--green);transform:translateX(3px)}
.result-empty{padding:1.5rem;text-align:center;font-family:'Roboto Condensed',sans-serif;font-size:.88rem;color:var(--muted)}

/* DETAIL PAGE */
#detailPage{display:none;padding:1.75rem;max-width:1300px;margin:0 auto}
.back-btn{display:inline-flex;align-items:center;gap:.45rem;font-family:'Roboto Condensed',sans-serif;font-size:.8rem;color:var(--sub);cursor:pointer;background:none;border:none;padding:0;margin-bottom:1.5rem;transition:color .2s;letter-spacing:.04em}
.back-btn:hover{color:var(--green)}
.back-btn:hover svg{transform:translateX(-3px)}
.back-btn svg{transition:transform .2s}

/* CLIENT HEADER */
.client-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.client-name{font-family:'Raleway',sans-serif;font-weight:800;font-size:2.2rem;letter-spacing:-.02em}
.client-sub{font-family:'Roboto Condensed',sans-serif;color:var(--sub);font-size:.88rem;margin-top:.3rem}
.proj-badges{display:flex;gap:.45rem;flex-wrap:wrap;align-items:center}
.proj-badge{font-family:'Roboto Condensed',sans-serif;font-size:.72rem;padding:.22rem .6rem;border-radius:3px;letter-spacing:.04em}
.badge-evo{background:rgba(60,230,95,.12);color:var(--green);border:1px solid rgba(60,230,95,.22)}
.badge-assist{background:rgba(96,165,250,.12);color:var(--assist);border:1px solid rgba(96,165,250,.22)}

/* LOADING */
#loadingDetail{display:none;flex-direction:column;align-items:center;gap:1rem;padding:4rem;color:var(--sub)}
.spinner-lg{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
.loading-step{font-family:'Roboto Condensed',sans-serif;font-size:.85rem;color:var(--muted)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:1rem;margin-bottom:1.75rem}
.stat{background:var(--bleu2);border:1px solid var(--border);border-radius:11px;padding:1.2rem 1.4rem}
.stat-lbl{font-family:'Roboto Condensed',sans-serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.stat-val{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.85rem;line-height:1}
.stat-val sup{font-size:.85rem;font-weight:400;color:var(--sub)}
.stat-sub{font-family:'Roboto Condensed',sans-serif;font-size:.73rem;color:var(--muted);margin-top:.3rem}

/* PANELS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.5rem}
@media(max-width:820px){.two-col{grid-template-columns:1fr}}
.panel{background:var(--bleu2);border:1px solid var(--border);border-radius:12px;padding:1.5rem}
.panel-title{font-family:'Raleway',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:1.1rem;display:flex;align-items:center;gap:.5rem}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0}
.dot.blue{background:var(--assist)}

/* EVO METER */
.evo-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.6rem}
.evo-big{font-family:'Raleway',sans-serif;font-weight:800;font-size:2.4rem;line-height:1}
.evo-big sub{font-size:1rem;font-weight:300;color:var(--sub);margin-left:.2rem}
.evo-remain{text-align:right;font-family:'Roboto Condensed',sans-serif;font-size:.8rem;color:var(--muted)}
.evo-remain .val{font-family:'Raleway',sans-serif;font-weight:700;font-size:1.1rem;display:block}
.prog-bar{height:10px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden;margin-bottom:.75rem}
.prog-fill{height:100%;border-radius:5px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.fill-ok{background:linear-gradient(90deg,#2dd55b,var(--green))}
.fill-warn{background:linear-gradient(90deg,#e08008,var(--warn))}
.fill-crit{background:linear-gradient(90deg,#d42020,var(--crit))}
.evo-stats{display:flex;gap:1.5rem;font-family:'Roboto Condensed',sans-serif;font-size:.78rem;color:var(--sub)}
.evo-stats strong{color:#fff;font-weight:400}

/* CONTRACTS */
.contracts-list{display:flex;flex-direction:column;gap:.7rem}
.ctr{background:var(--bleu3);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem}
.ctr-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;margin-bottom:.25rem}
.ctr-name{font-family:'Raleway',sans-serif;font-weight:700;font-size:.9rem}
.ctr-hrs{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.2rem;color:var(--green)}
.ctr-hrs small{font-size:.72rem;font-weight:300;color:var(--sub);margin-left:.2rem}
.ctr-meta{font-family:'Roboto Condensed',sans-serif;font-size:.72rem;color:var(--muted)}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.5rem}
@media(max-width:700px){.charts-row{grid-template-columns:1fr}}
.chart-wrap{position:relative;height:185px}

/* TICKETS */
.tickets-wrap{background:var(--bleu2);border:1px solid var(--border);border-radius:12px;padding:1.5rem}
.filter-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.fbtn{background:var(--bleu3);border:1px solid var(--border);color:var(--sub);font-family:'Roboto Condensed',sans-serif;font-size:.75rem;padding:.28rem .7rem;border-radius:3px;cursor:pointer;transition:all .2s}
.fbtn:hover,.fbtn.active{border-color:rgba(60,230,95,.35);color:var(--green);background:rgba(60,230,95,.06)}
.fbtn.blue.active,.fbtn.blue:hover{border-color:rgba(96,165,250,.35);color:var(--assist);background:rgba(96,165,250,.06)}
.tbl-wrap{overflow-x:auto}
table.tix{width:100%;border-collapse:collapse}
table.tix th{font-family:'Roboto Condensed',sans-serif;font-size:.68rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);padding:.55rem 1rem;text-align:left;border-bottom:1px solid var(--border)}
table.tix td{padding:.7rem 1rem;border-bottom:1px solid rgba(255,255,255,.04);font-family:'Roboto Condensed',sans-serif;font-size:.82rem;color:var(--sub);vertical-align:middle}
table.tix tr:last-child td{border-bottom:none}
table.tix tr:hover td{background:rgba(255,255,255,.025);color:#fff}
.td-title{color:#fff;max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.td-time{font-family:'Raleway',sans-serif;font-weight:700;color:var(--green);white-space:nowrap}
.td-zero{color:var(--muted)}
.tag{display:inline-block;padding:.14rem .48rem;border-radius:2px;font-size:.7rem;letter-spacing:.04em}
.tag-evo{background:rgba(60,230,95,.1);color:var(--green);border:1px solid rgba(60,230,95,.18)}
.tag-assist{background:rgba(96,165,250,.1);color:var(--assist);border:1px solid rgba(96,165,250,.18)}
.tag-closed{background:rgba(60,230,95,.1);color:var(--green);border:1px solid rgba(60,230,95,.18)}
.tag-open{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.18)}
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-family:'Roboto Condensed',sans-serif}
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.28);color:#fca5a5;font-family:'Roboto Condensed',sans-serif;font-size:.85rem;padding:.75rem 1rem;border-radius:8px;margin:1rem 0}

/* MINI LIST */
.mini-list{margin-top:1rem;border-top:1px solid var(--border);padding-top:.9rem}
.mini-lbl{font-family:'Roboto Condensed',sans-serif;font-size:.68rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.mini-row{display:flex;justify-content:space-between;align-items:center;padding:.32rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.mini-row:last-child{border-bottom:none}
.mini-row span:first-child{font-family:'Roboto Condensed',sans-serif;font-size:.8rem;color:var(--sub);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-row span:last-child{font-family:'Raleway',sans-serif;font-weight:700;font-size:.8rem;color:var(--green);flex-shrink:0;margin-left:.5rem}
</style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="goHome()">Equinox<em>es</em><span class="nav-tag">EVO</span></div>
  <div>
    <button class="btn-nav" id="btnRefresh" style="display:none" onclick="refreshClient()">↺ Actualiser</button>
  </div>
</nav>

<!-- PAGE RECHERCHE -->
<div id="searchPage">
  <div class="search-hero">
    <div class="search-eyebrow">Dashboard interne</div>
    <h1>Suivi <em>EVO</em></h1>
    <p>Recherchez un client pour afficher son dashboard</p>
  </div>

  <div class="search-box">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Nom du client…" autocomplete="off" oninput="onSearch()">
    <div class="search-spinner" id="searchSpinner"><div class="spinner-sm"></div></div>
  </div>

  <div id="searchResults"></div>
</div>

<!-- PAGE DÉTAIL -->
<div id="detailPage">
  <button class="back-btn" onclick="goHome()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Retour à la recherche
  </button>

  <div id="loadingDetail">
    <div class="spinner-lg"></div>
    <div class="loading-step" id="loadingStep">Chargement…</div>
  </div>

  <div id="clientContent" style="display:none"></div>
</div>

<script>
const PROXY = '';
const EVO_IDS   = [2452592, 2452594, 2452595];
const EVO_HOURS = {2452592:2, 2452594:4, 2452595:10};
const EVO_LBLS  = {2452592:'EVO 2h', 2452594:'EVO 4h', 2452595:'EVO 10h'};

let currentClientId = null;
let chartA = null, chartB = null;
let searchTimer = null;

// ═══════════════════════════════
// API — page en HEADER
// ═══════════════════════════════
function axo(path, page) {
  const headers = {'Content-Type':'application/json'};
  if (page) headers['page'] = String(page);
  return fetch(PROXY + path, {headers})
    .then(r => { if(!r.ok) throw new Error('HTTP '+r.status+' — '+path); return r.json(); });
}

async function axoAll(path) {
  let page=1, all=[];
  while(true) {
    const data = await axo(path, page);
    const items = Array.isArray(data) ? data : [];
    all = all.concat(items);
    if(items.length < 500) break;
    page++;
  }
  return all;
}

// ═══════════════════════════════
// HELPERS
// ═══════════════════════════════
function fmtH(h) {
  if(!h && h!==0) return '—';
  const hh=Math.floor(h), mm=Math.round((h-hh)*60);
  if(hh===0) return mm+'min';
  return mm>0 ? hh+'h'+String(mm).padStart(2,'0') : hh+'h';
}
function fmtDate(ts) {
  if(!ts) return '—';
  const d = isNaN(ts) ? new Date(ts) : new Date(Number(ts)*1000);
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
}
function barCls(p) { return p>=90?'fill-crit':p>=70?'fill-warn':'fill-ok'; }
function isEvo(name) { return name && name.toLowerCase().includes('evo'); }
function isAssist(name) { return name && name.toLowerCase().includes('assistance'); }

// ═══════════════════════════════
// NAVIGATION
// ═══════════════════════════════
function goHome() {
  document.getElementById('detailPage').style.display = 'none';
  document.getElementById('searchPage').style.display = 'flex';
  document.getElementById('btnRefresh').style.display = 'none';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').style.display = 'none';
  if(chartA){chartA.destroy();chartA=null;}
  if(chartB){chartB.destroy();chartB=null;}
  currentClientId = null;
}

// ═══════════════════════════════
// RECHERCHE CLIENT
// ═══════════════════════════════
function onSearch() {
  clearTimeout(searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  if(q.length < 2) {
    document.getElementById('searchResults').style.display = 'none';
    return;
  }
  searchTimer = setTimeout(() => searchClients(q), 350);
}

async function searchClients(q) {
  const spinner = document.getElementById('searchSpinner');
  const results = document.getElementById('searchResults');
  spinner.style.display = 'block';

  try {
    // API Axonaut supporte ?search= pour filtrer par nom
    const data = await axo('/api/v2/companies?search=' + encodeURIComponent(q), 1);
    const items = Array.isArray(data) ? data : [];

    spinner.style.display = 'none';
    results.style.display = 'block';

    if(!items.length) {
      results.innerHTML = '<div class="result-empty">Aucun client trouvé pour "'+q+'"</div>';
      return;
    }

    results.innerHTML = items.slice(0,8).map(c => `
      <div class="result-item" onclick="loadClient(${c.id}, '${(c.name||'').replace(/'/g,"\\'")}')">
        <div>
          <div class="result-name">${c.name || 'Client #'+c.id}</div>
          <div class="result-meta">${c.address_city || ''} ${c.address_city && c.email ? '·' : ''} ${c.email || ''}</div>
        </div>
        <svg class="result-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`).join('');

  } catch(e) {
    spinner.style.display = 'none';
    results.style.display = 'block';
    results.innerHTML = '<div class="result-empty" style="color:#fca5a5">Erreur : '+e.message+'</div>';
  }
}

// ═══════════════════════════════
// CHARGEMENT CLIENT
// ═══════════════════════════════
async function loadClient(clientId, clientName) {
  currentClientId = clientId;
  document.getElementById('searchPage').style.display = 'none';
  document.getElementById('detailPage').style.display = 'block';
  document.getElementById('loadingDetail').style.display = 'flex';
  document.getElementById('clientContent').style.display = 'none';
  document.getElementById('btnRefresh').style.display = 'block';
  if(chartA){chartA.destroy();chartA=null;}
  if(chartB){chartB.destroy();chartB=null;}

  try {
    setStep('Chargement des factures…');
    const invoices = await axoAll('/api/v2/companies/'+clientId+'/invoices');

    setStep('Chargement des projets…');
    const projects = await axoAll('/api/v2/companies/'+clientId+'/contracts');
    // On utilise aussi les projets
    const projData = await axoAll('/api/v2/projects');
    const clientProjects = projData.filter(p => String(p.company_id) === String(clientId));

    setStep('Chargement des tickets…');
    const tickets = await axoAll('/api/v2/tickets?company_id='+clientId);

    setStep('Chargement des temps passés…');
    const evoPrj    = clientProjects.filter(p => isEvo(p.name));
    const assistPrj = clientProjects.filter(p => isAssist(p.name));
    const allPrj    = [...evoPrj, ...assistPrj];
    const prjIds    = new Set(allPrj.map(p => p.id));

    const relTickets = tickets.filter(t => t.project_id && prjIds.has(t.project_id));

    // Charger les timetrackings en parallèle (batch 5)
    const tts = {};
    for(let i=0; i<relTickets.length; i+=5) {
      const batch = relTickets.slice(i, i+5);
      setStep('Temps passés… ('+Math.min(i+5,relTickets.length)+'/'+relTickets.length+' tickets)');
      await Promise.all(batch.map(async t => {
        try { tts[t.id] = await axoAll('/api/v2/tickets/'+t.id+'/timetrackings'); }
        catch(e) { tts[t.id] = []; }
      }));
    }

    // Enrichir tickets
    const enriched = relTickets.map(t => {
      const h = (tts[t.id]||[]).reduce((s,tt)=>s+parseFloat(tt.hours||0),0);
      const prj = allPrj.find(p=>p.id===t.project_id);
      return {...t, hours:h, projectName: prj?prj.name:''};
    }).sort((a,b)=>new Date(b.creation_date)-new Date(a.creation_date));

    // Contrats EVO achetés
    const contracts = [];
    for(const inv of invoices) {
      for(const ln of (inv.invoice_lines||[])) {
        const pid = Number(ln.product_id);
        if(!EVO_IDS.includes(pid)) continue;
        contracts.push({
          label: EVO_LBLS[pid],
          hours: EVO_HOURS[pid] * (ln.quantity||1),
          qty: ln.quantity||1,
          invoiceNum: inv.number||inv.id,
          invoiceDate: inv.date,
        });
      }
    }

    const soldH  = contracts.reduce((s,c)=>s+c.hours,0);
    const evoTix = enriched.filter(t=>isEvo(t.projectName));
    const usedH  = evoTix.reduce((s,t)=>s+t.hours,0);
    const remH   = Math.max(0,soldH-usedH);
    const pct    = soldH>0 ? Math.min(100,Math.round((usedH/soldH)*100)) : 0;

    document.getElementById('loadingDetail').style.display = 'none';
    document.getElementById('clientContent').style.display = 'block';

    renderClient({
      clientId, clientName,
      evoPrj, assistPrj, contracts,
      tickets: enriched, evoTix,
      soldH, usedH, remH, pct
    });

  } catch(e) {
    document.getElementById('loadingDetail').style.display = 'none';
    document.getElementById('clientContent').style.display = 'block';
    document.getElementById('clientContent').innerHTML =
      '<div class="error-box">Erreur : '+e.message+'</div>';
  }
}

function setStep(txt) {
  document.getElementById('loadingStep').textContent = txt;
}

function refreshClient() {
  if(currentClientId) loadClient(currentClientId, '');
}

// ═══════════════════════════════
// RENDU
// ═══════════════════════════════
function renderClient(d) {
  const rc = d.remH<1?'var(--crit)':d.remH<2?'var(--warn)':'var(--green)';
  const pc = d.pct>=90?'var(--crit)':d.pct>=70?'var(--warn)':'var(--green)';

  const badges = [
    ...d.evoPrj.map(p=>'<span class="proj-badge badge-evo">'+p.name+'</span>'),
    ...d.assistPrj.map(p=>'<span class="proj-badge badge-assist">'+p.name+'</span>'),
  ].join('');

  // Contrats
  const contratsHTML = !d.contracts.length
    ? '<div class="empty">Aucun contrat EVO facturé</div>'
    : d.contracts.map(c=>`
      <div class="ctr">
        <div class="ctr-top">
          <span class="ctr-name">${c.label}</span>
          <span class="ctr-hrs">${c.hours}h<small>achetées</small></span>
        </div>
        <div class="ctr-meta">Facture ${c.invoiceNum} · ${fmtDate(c.invoiceDate)} · qté ${c.qty}</div>
      </div>`).join('');

  // Mini liste EVO
  const miniList = d.evoTix.length ? `
    <div class="mini-list">
      <div class="mini-lbl">Dernières interventions EVO</div>
      ${d.evoTix.slice(0,6).map(t=>`
        <div class="mini-row">
          <span>${t.title||'#'+t.id}</span>
          <span>${t.hours>0?fmtH(t.hours):'—'}</span>
        </div>`).join('')}
      ${d.evoTix.length>6?'<div style="font-family:Roboto Condensed;font-size:.73rem;color:var(--muted);margin-top:.4rem">+'+( d.evoTix.length-6)+' autres ci-dessous</div>':''}
    </div>` : '';

  // Tickets
  const assistTix = d.tickets.filter(t=>!isEvo(t.projectName));
  const tixRows = !d.tickets.length
    ? '<tr><td colspan="6" class="empty">Aucun ticket trouvé</td></tr>'
    : d.tickets.map(t=>{
        const evo = isEvo(t.projectName);
        return `<tr data-proj="${evo?'evo':'assist'}">
          <td style="color:var(--muted)">${t.reference||'#'+t.id}</td>
          <td class="td-title">${t.title||'—'}</td>
          <td><span class="tag ${evo?'tag-evo':'tag-assist'}">${t.projectName||'—'}</span></td>
          <td>${t.hours>0?'<span class="td-time">'+fmtH(t.hours)+'</span>':'<span class="td-zero">—</span>'}</td>
          <td><span class="tag ${t.is_closed?'tag-closed':'tag-open'}">${t.is_closed?'Fermé':'Ouvert'}</span></td>
          <td>${fmtDate(t.creation_date)}</td>
        </tr>`;
      }).join('');

  document.getElementById('clientContent').innerHTML = `
    <div class="client-header">
      <div>
        <div class="client-name">${d.clientName}</div>
        <div class="client-sub">${d.contracts.length} contrat(s) EVO · ${d.tickets.length} ticket(s)</div>
      </div>
      <div class="proj-badges">${badges}</div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-lbl">Heures achetées</div>
        <div class="stat-val">${d.soldH}<sup>h</sup></div>
        <div class="stat-sub">${d.contracts.length} contrat(s)</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Heures consommées</div>
        <div class="stat-val" style="color:${pc}">${fmtH(d.usedH)}</div>
        <div class="stat-sub">${d.pct}% utilisé</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Solde restant</div>
        <div class="stat-val" style="color:${rc}">${fmtH(d.remH)}</div>
        <div class="stat-sub">${d.evoTix.length} intervention(s) EVO</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Total tickets</div>
        <div class="stat-val">${d.tickets.length}</div>
        <div class="stat-sub">EVO + Assistance</div>
      </div>
    </div>

    <div class="charts-row">
      <div class="panel">
        <div class="panel-title"><span class="dot"></span>Répartition tickets</div>
        <div class="chart-wrap"><canvas id="cDonut"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-title"><span class="dot"></span>Temps par projet (h)</div>
        <div class="chart-wrap"><canvas id="cBar"></canvas></div>
      </div>
    </div>

    <div class="two-col">
      <div class="panel">
        <div class="panel-title"><span class="dot"></span>Contrats EVO achetés</div>
        <div class="contracts-list">${contratsHTML}</div>
      </div>
      <div class="panel">
        <div class="panel-title"><span class="dot"></span>Solde EVO</div>
        <div class="evo-top">
          <div class="evo-big">${fmtH(d.usedH)}<sub>utilisés</sub></div>
          <div class="evo-remain"><span class="val" style="color:${rc}">${fmtH(d.remH)}</span>restants</div>
        </div>
        <div class="prog-bar"><div class="prog-fill ${barCls(d.pct)}" style="width:${d.pct}%"></div></div>
        <div class="evo-stats">
          <span>Acheté : <strong>${d.soldH}h</strong></span>
          <span>Consommé : <strong>${fmtH(d.usedH)}</strong></span>
          <span>${d.pct}%</span>
        </div>
        ${miniList}
      </div>
    </div>

    <div class="tickets-wrap">
      <div class="panel-title" style="margin-bottom:.75rem"><span class="dot blue"></span>Tous les tickets</div>
      <div class="filter-row" id="filterRow">
        <button class="fbtn active" onclick="filterTix(null,this)">Tous (${d.tickets.length})</button>
        <button class="fbtn active" onclick="filterTix('evo',this)">EVO (${d.evoTix.length})</button>
        <button class="fbtn blue" onclick="filterTix('assist',this)">Assistance (${assistTix.length})</button>
      </div>
      <div class="tbl-wrap">
        <table class="tix" id="tixTable">
          <thead><tr><th>Réf.</th><th>Sujet</th><th>Projet</th><th>Temps</th><th>Statut</th><th>Date</th></tr></thead>
          <tbody>${tixRows}</tbody>
        </table>
      </div>
    </div>`;

  buildCharts(d);
}

// ═══════════════════════════════
// CHARTS
// ═══════════════════════════════
function buildCharts(d) {
  const evoC = d.evoTix.length;
  const asC  = d.tickets.length - evoC;
  const evoH = d.evoTix.reduce((s,t)=>s+t.hours,0);
  const asH  = d.tickets.filter(t=>!isEvo(t.projectName)).reduce((s,t)=>s+t.hours,0);

  const base = {responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'rgba(255,255,255,.6)',font:{family:'Roboto Condensed',size:11}}}}};

  chartA = new Chart(document.getElementById('cDonut'),{type:'doughnut',
    data:{labels:['EVO','Assistance'],datasets:[{data:[evoC,asC],
      backgroundColor:['rgba(60,230,95,.75)','rgba(96,165,250,.75)'],
      borderColor:'transparent',borderWidth:0,hoverOffset:6}]},
    options:{...base,cutout:'68%',
      plugins:{...base.plugins,tooltip:{callbacks:{label:ctx=>' '+ctx.label+' : '+ctx.parsed+' ticket(s)'}}}}});

  chartB = new Chart(document.getElementById('cBar'),{type:'bar',
    data:{labels:['EVO','Assistance'],datasets:[{label:'Heures',
      data:[Math.round(evoH*100)/100, Math.round(asH*100)/100],
      backgroundColor:['rgba(60,230,95,.7)','rgba(96,165,250,.7)'],
      borderRadius:5,borderSkipped:false}]},
    options:{...base,indexAxis:'y',
      scales:{
        x:{ticks:{color:'rgba(255,255,255,.4)',font:{family:'Roboto Condensed',size:10}},grid:{color:'rgba(255,255,255,.05)'},border:{display:false}},
        y:{ticks:{color:'rgba(255,255,255,.65)',font:{family:'Roboto Condensed',size:11}},grid:{display:false},border:{display:false}}
      },
      plugins:{...base.plugins,legend:{display:false},
        tooltip:{callbacks:{label:ctx=>' '+fmtH(ctx.parsed.x)}}}}});
}

// ═══════════════════════════════
// FILTRE TICKETS
// ═══════════════════════════════
function filterTix(type, btn) {
  document.querySelectorAll('#filterRow .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#tixTable tbody tr[data-proj]').forEach(r=>{
    r.style.display = (!type || r.dataset.proj===type) ? '' : 'none';
  });
}

// Focus auto sur la recherche
document.getElementById('searchInput').focus();
</script>
